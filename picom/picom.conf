#################################
#   Picom — Catppuccin Mocha
#################################

# Backend
# IMPORTANTE (GPU híbrida AMD+NVIDIA / PRIME): con backend "glx" picom deja en
# NEGRO los monitores que no maneja la GPU primaria. "xrender" es compatible con
# PRIME y renderiza bien en las 3 pantallas (mantiene esquinas, sombras, fade y
# transparencia; lo único que no soporta es el blur, que se desactiva abajo).
backend = "xrender";
vsync = true;

# Esquinas redondeadas
corner-radius = 10;
rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'"
];

# Sombras
shadow = true;
shadow-radius = 16;
shadow-opacity = 0.45;
shadow-offset-x = -16;
shadow-offset-y = -16;
shadow-color = "#11111b";
shadow-exclude = [
  "name = 'Notification'",
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "_GTK_FRAME_EXTENTS@:c"
];

# Transparencia (sutil)
inactive-opacity = 0.95;
active-opacity = 1.0;
frame-opacity = 1.0;
inactive-opacity-override = false;
inactive-dim = 0.0;

# Excluir de la transparencia (no afectar polybar/fullscreen)
opacity-rule = [
  "100:fullscreen",
  "100:class_g = 'polybar'"
];

# Blur DESACTIVADO: requiere backend glx (dual_kawase), que aquí ennegrece
# monitores por la GPU híbrida. Con xrender no hay blur.
blur-method = "none";

# Animaciones de aparición/desaparición
fading = true;
fade-in-step = 0.04;
fade-out-step = 0.04;
fade-delta = 5;

# Generales
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
use-damage = true;
