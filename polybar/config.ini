;==========================================================
;   Polybar — Catppuccin Mocha
;==========================================================

[colors]
base       = #1e1e2e
mantle     = #181825
crust      = #11111b
text       = #cdd6f4
subtext    = #a6adc8
surface0   = #313244
surface1   = #45475a
overlay0   = #6c7086
blue       = #89b4fa
lavender   = #b4befe
mauve      = #cba6f7
green      = #a6e3a1
yellow     = #f9e2af
peach      = #fab387
red        = #f38ba8
teal       = #94e2d5

[bar/main]
monitor = ${env:MONITOR:}
width = 100%
height = 34pt
radius = 0

background = ${colors.base}
foreground = ${colors.text}

line-size = 3pt

padding-left = 1
padding-right = 2
module-margin-left = 1
module-margin-right = 1

separator = |
separator-foreground = ${colors.surface1}

font-0 = FiraCode Nerd Font:size=11;3
font-1 = FiraCode Nerd Font:size=15;4
font-2 = FiraCode Nerd Font:style=Bold:size=11;3

modules-left = i3
modules-center = date
modules-right = pulseaudio backlight memory cpu wlan battery

cursor-click = pointer
enable-ipc = true

tray-position = right
tray-background = ${colors.base}
tray-padding = 2

[bar/sec]
inherit = bar/main
tray-position = none

;==========================================================
;   Modules
;==========================================================

[module/i3]
type = internal/i3
pin-workspaces = true
index-sort = true
wrapping-scroll = false
enable-click = true

format = <label-state> <label-mode>

label-mode = %mode%
label-mode-padding = 2
label-mode-foreground = ${colors.base}
label-mode-background = ${colors.yellow}

label-focused = %name%
label-focused-foreground = ${colors.blue}
label-focused-background = ${colors.surface0}
label-focused-underline = ${colors.blue}
label-focused-padding = 2

label-visible = %name%
label-visible-foreground = ${colors.text}
label-visible-padding = 2

label-unfocused = %name%
label-unfocused-foreground = ${colors.overlay0}
label-unfocused-padding = 2

label-urgent = %name%
label-urgent-foreground = ${colors.base}
label-urgent-background = ${colors.red}
label-urgent-padding = 2

[module/date]
type = internal/date
interval = 1
date = %a %d %b
time = %H:%M
label =  %date%   %time%
label-foreground = ${colors.text}

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "󰍛 "
format-prefix-foreground = ${colors.peach}
label = %percentage:2%%

[module/memory]
type = internal/memory
interval = 2
warn-percentage = 85

format = <label>
format-prefix = " "
format-prefix-foreground = ${colors.green}
label = %gb_used% %percentage_used%%

format-warn = <label-warn>
format-warn-prefix = " "
format-warn-prefix-foreground = ${colors.red}
label-warn = %gb_used% %percentage_used%%
label-warn-foreground = ${colors.red}

[module/wlan]
type = internal/network
interface = wlp2s0
interval = 3
format-connected = <label-connected>
format-connected-prefix = "󰖩 "
format-connected-prefix-foreground = ${colors.blue}
label-connected = %essid%
format-disconnected = <label-disconnected>
format-disconnected-prefix = "󰖪 "
format-disconnected-prefix-foreground = ${colors.red}
label-disconnected = offline
label-disconnected-foreground = ${colors.overlay0}

[module/backlight]
type = internal/backlight
card = nvidia_wmi_ec_backlight
use-actual-brightness = true
enable-scroll = true
format = <label>
format-prefix = "󰃟 "
format-prefix-foreground = ${colors.yellow}
label = %percentage%%

[module/pulseaudio]
type = internal/pulseaudio
format-volume = <ramp-volume> <label-volume>
label-volume = %percentage%%
ramp-volume-0 = 󰕿
ramp-volume-1 = 󰖀
ramp-volume-2 = 󰕾
ramp-volume-foreground = ${colors.mauve}
label-muted = 󰝟 muted
label-muted-foreground = ${colors.overlay0}
click-right = pavucontrol

[module/battery]
type = internal/battery
battery = BAT0
adapter = ADP0
full-at = 98
low-at = 15

format-charging = <animation-charging> <label-charging>
format-discharging = <ramp-capacity> <label-discharging>
format-full = <label-full>
format-full-prefix = "󰁹 "
format-full-prefix-foreground = ${colors.green}

label-charging = %percentage%%
label-discharging = %percentage%%
label-full = %percentage%%
label-low = %percentage%%

ramp-capacity-0 = 󰂎
ramp-capacity-1 = 󰁻
ramp-capacity-2 = 󰁽
ramp-capacity-3 = 󰂀
ramp-capacity-4 = 󰁹
ramp-capacity-foreground = ${colors.yellow}

animation-charging-0 = 󰢜
animation-charging-1 = 󰂆
animation-charging-2 = 󰂈
animation-charging-3 = 󰂉
animation-charging-4 = 󰂅
animation-charging-foreground = ${colors.green}
animation-charging-framerate = 750

[settings]
; Lo manejamos nosotros en launch.sh (se relanza en cada restart de i3).
; Con multi-monitor, dejarlo en true hace que las barras se recarguen a la vez
; al cambiar de pantalla y se maten entre sí (solo sobrevive una).
screenchange-reload = false
pseudo-transparency = false
